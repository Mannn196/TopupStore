<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemoyTopUpSTORE - Pilihan Gamer Hemat & Cepat</title>
    <style>
        :root {
            --primary: #ff6b81; /* Warna pink gemoy */
            --secondary: #2f3542;
            --dark: #1e2229;
            --light: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
        }

        /* Navbar */
        nav {
            background-color: var(--secondary);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary);
        }

        /* Gaya Logo Baru */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 50%; /* Membuat logo berbentuk bulat rapi */
            border: 2px solid var(--primary);
            box-shadow: 0 0 8px rgba(255, 107, 129, 0.5);
        }

        nav .logo-text {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        /* Banner */
        .banner {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1000') no-repeat center center/cover;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .banner h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .banner p {
            color: #ced6e0;
        }

        /* Game Section */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary);
            padding-left: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-card {
            background-color: var(--secondary);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, border 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border: 1px solid var(--primary);
        }

        .game-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-info h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .game-info p {
            font-size: 12px;
            color: #a4b0be;
        }

        /* Footer */
        footer {
            background-color: #11141a;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            font-size: 14px;
            color: #747d8c;
        }
    </style>
</head>
<body>

    <!-- NAVIGASI DENGAN LOGO BARU -->
    <nav>
        <div class="logo-container">
            <img src="https://i.ibb.co/n8NL5x2k/image.png" alt="Logo GemoyTopUpSTORE" class="logo-img">
            <span class="logo-text">GemoyTopUpSTORE</span>
        </div>
    </nav>

    <!-- BANNER UTAMA -->
    <div class="banner">
        <h1>Top Up Game Otomatis & Terpercaya</h1>
        <p>Proses kilat 24 jam nonstop dengan harga paling Gemoy!</p>
    </div>

    <!-- DAFTAR GAME -->
    <div class="container">
        <h2 class="section-title">Game Populer</h2>
        <div class="game-grid">
            
            <!-- Game 1: MLBB -->
            <div class="game-card" onclick="alert('Form order Mobile Legends menuju sistem otomatis API')">
                <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=300" alt="Mobile Legends">
                <div class="game-info">
                    <h3>Mobile Legends</h3>
                    <p>Moonton</p>
                </div>
            </div>

            <!-- Game 2: Free Fire -->
            <div class="game-card" onclick="alert('Form order Free Fire menuju sistem otomatis API')">
                <img src="https://images.unsplash.com/photo-1538481199705-c710c4e965fc?q=80&w=300" alt="Free Fire">
                <div class="game-info">
                    <h3>Free Fire</h3>
                    <p>Garena</p>
                </div>
            </div>

            <!-- Game 3: PUBG Mobile -->
            <div class="game-card" onclick="alert('Form order PUBG Mobile menuju sistem otomatis API')">
                <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=300" alt="PUBG Mobile">
                <div class="game-info">
                    <h3>PUBG Mobile</h3>
                    <p>Tencent</p>
                </div>
            </div>

            <!-- Game 4: Honor of Kings -->
            <div class="game-card" onclick="alert('Form order HOK menuju sistem otomatis API')">
                <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=300" alt="Honor of Kings">
                <div class="game-info">
                    <h3>Honor of Kings</h3>
                    <p>Level Infinite</p>
                </div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        &copy; 2026 GemoyTopUpSTORE. All Rights Reserved.
    </footer>

</body>
</html>
